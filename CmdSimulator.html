<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<title>CMD Course Simulator</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff00;
    font-family: "Courier New", monospace;
}

.screen {
    padding: 20px;
}

.hidden {
    display: none;
}

button {
    background: black;
    border: 1px solid #00ff00;
    color: #00ff00;
    padding: 10px 20px;
    margin: 10px;
    cursor: pointer;
}

button:hover {
    background: #00ff00;
    color: black;
}

.terminal {
    height: 80vh;
    overflow-y: auto;
}

.line {
    margin: 5px 0;
}

input {
    background: black;
    border: none;
    color: #00ff00;
    font-family: inherit;
    font-size: 16px;
    outline: none;
    width: 90%;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="screen" id="menu">
    <h1>CMD Training Course</h1>
    <p>Select Difficulty:</p>
    <button onclick="startCourse('easy')">Easy (5 Steps)</button>
    <button onclick="startCourse('medium')">Medium (10 Steps)</button>
    <button onclick="startCourse('hard')">Hard (15 Steps)</button>
</div>

<!-- TERMINAL -->
<div class="screen hidden" id="simulator">
    <div class="terminal" id="terminal"></div>

    <div class="line">
        C:\User> <input id="input" autofocus>
    </div>
</div>

<script>
const terminal = document.getElementById("terminal");
const input = document.getElementById("input");

let lessons = [];
let step = 0;

/* COURSES */
const courses = {
    easy: [
        ["Type: help", "help", "Lists available commands"],
        ["Type: ping server.local", "ping server.local", "Checks if server is online"],
        ["Type: ipconfig", "ipconfig", "Shows your IP address"],
        ["Type: cls", "cls", "Clears the screen"],
        ["Type: netstat", "netstat", "Shows active connections"]
    ],

    medium: [
        ["Type: help", "help", "Lists commands"],
        ["Type: ping google.com", "ping google.com", "Tests connectivity"],
        ["Type: tracert google.com", "tracert google.com", "Shows route"],
        ["Type: ipconfig /all", "ipconfig /all", "Detailed IP info"],
        ["Type: netstat -an", "netstat -an", "Connections + ports"],
        ["Type: tasklist", "tasklist", "Shows running programs"],
        ["Type: whoami", "whoami", "Displays current user"],
        ["Type: hostname", "hostname", "Shows device name"],
        ["Type: systeminfo", "systeminfo", "System details"],
        ["Type: cls", "cls", "Clears terminal"]
    ],

    hard: [
        ["Type: help", "help", "Lists commands"],
        ["Type: ping 8.8.8.8", "ping 8.8.8.8", "Tests Google DNS"],
        ["Type: tracert 8.8.8.8", "tracert 8.8.8.8", "Trace route"],
        ["Type: nslookup google.com", "nslookup google.com", "Find IP from domain"],
        ["Type: netstat -ano", "netstat -ano", "Connections + process IDs"],
        ["Type: tasklist", "tasklist", "Processes"],
        ["Type: taskkill /IM notepad.exe /F", "taskkill /IM notepad.exe /F", "Force close program"],
        ["Type: whoami", "whoami", "Current user"],
        ["Type: hostname", "hostname", "Device name"],
        ["Type: systeminfo", "systeminfo", "System info"],
        ["Type: ipconfig /release", "ipconfig /release", "Release IP"],
        ["Type: ipconfig /renew", "ipconfig /renew", "Renew IP"],
        ["Type: color 0a", "color 0a", "Change terminal color"],
        ["Type: echo Hello", "echo hello", "Print text"],
        ["Type: cls", "cls", "Clear terminal"]
    ]
};

function print(text) {
    const line = document.createElement("div");
    line.classList.add("line");
    line.textContent = text;
    terminal.appendChild(line);
    window.scrollTo(0, document.body.scrollHeight);
}

function startCourse(level) {
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("simulator").classList.remove("hidden");

    lessons = courses[level];
    step = 0;

    print("Starting " + level.toUpperCase() + " course...");
    nextStep();
}

function nextStep() {
    print("");
    print("Step " + (step + 1) + ": " + lessons[step][0]);
}

input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        const value = input.value.trim().toLowerCase();

        print("C:\\User> " + value);

        if (value === lessons[step][1]) {
            print("✔ Correct: " + lessons[step][2]);
            step++;

            if (step < lessons.length) {
                nextStep();
            } else {
                print("");
                print("🎉 Course Complete!");
            }
        } else {
            print("✖ Incorrect");
            print("Hint: " + lessons[step][1]);
        }

        input.value = "";
    }
});
</script>

</body>
<button onclick="location.reload()">Restart</button>
</html>
